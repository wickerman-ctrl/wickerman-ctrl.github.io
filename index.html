<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WickerMan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
        
        body {
            background-color: #050a15;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', monospace;
            text-rendering: optimizeSpeed; 
            overflow: hidden;
            position: relative;
            padding: 10px; /* Чтобы не липло к краям */
            box-sizing: border-box;
        }

        #particles-js {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .player-card {
            z-index: 10;
            background: rgba(10, 20, 40, 0.9);
            backdrop-filter: blur(15px);
            border: 4px solid #1e3a5f;
            border-radius: 12px;
            display: flex;
            flex-direction: column; /* В одну колонку ВСЕГДА */
            padding: 25px;
            gap: 15px;
            box-shadow: 0 0 70px rgba(0, 0, 0, 0.9);
            
            /* Адаптивная ширина */
            width: 95%; 
            max-width: 500px; /* Узкая колонка как на скрине */
            box-sizing: border-box;
        }

        /* --- БЛОК С НИКОМ И ТГ --- */
        .nickname-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center; /* Центрируем ник */
            margin-bottom: 5px; 
        }
        
        .nickname-link { 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            color: inherit; 
        }
        
        .nickname { 
            font-size: 42px; /* Чуть меньше для узкой колонки */
            color: #00d4ff; 
            text-shadow: 4px 4px 0px rgba(0,0,0,0.5); 
            text-transform: uppercase; 
        }
        
        .tg-icon { 
            width: 24px; 
            height: 24px; 
            margin-left: 10px; 
            fill: #00d4ff; 
            transition: 0.2s; 
        }
        .nickname-link:hover .nickname { color: #ffffff; }
        .nickname-link:hover .tg-icon { fill: #ffffff; transform: scale(1.1); }

        /* --- БЛОК С ТЕКСТОМ ОПИСАНИЯ --- */
        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center; /* Центрируем текст как на скрине */
            color: #b0c4de;
            font-size: 20px; /* Узкая колонка */
            line-height: 1.3;
            white-space: pre-line;
            border-bottom: 2px solid rgba(30, 58, 95, 0.3); /* Разделитель */
            padding-bottom: 15px;
        }

        /* --- БЛОК СО СКИНОВ (НАД ПЛЕЕРОМ) --- */
        #skin_container { 
            width: 200px; /* Чуть меньше, чтобы колонка была узкой */
            height: 300px; 
            background: rgba(0, 0, 0, 0.3); 
            border-radius: 8px; 
            cursor: grab; 
            border: 2px solid #1e3a5f; 
            margin: 0 auto; /* Центрируем скин */
            flex-shrink: 0;
        }

        /* --- ПЛЕЕР --- */
        .music-player {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #1e3a5f;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-cover {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            border: 2px solid #1e3a5f;
            background: url('cover.jpg') no-repeat center center;
            background-size: cover;
            image-rendering: pixelated;
            flex-shrink: 0;
        }

        .player-controls {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .track-info {
            font-size: 16px;
            color: #00d4ff;
            display: flex;
            justify-content: space-between;
        }

        .progress-container {
            height: 6px;
            background: #1e3a5f;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #00d4ff;
            width: 0%;
        }

        .btn-play {
            background: none;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            font-family: 'VT323', monospace;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 10px;
            transition: 0.2s;
        }

        .btn-play:hover { background: #00d4ff; color: #050a15; }

    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="player-card">
    
    <div class="nickname-wrapper">
        <a href="https://t.me/wickerman1" target="_blank" class="nickname-link">
            <span class="nickname">WickerMan</span>
            <svg class="tg-icon" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.6 7.42c-.2.9-.6 3.1-.8 4.2-.2 1.1-.3 1.8-.3 1.8l-1.6 4.3c-.1.2-.3.4-.6.4h-.1c-.3 0-.5-.1-.7-.3l-3-2.1-1.6 1.6c-.2.2-.5.3-.8.3-.1 0-.2 0-.3-.1L7.5 16.5 4.8 14.8c-.3-.2-.5-.5-.5-.8s.2-.6.5-.8l12.1-4.8c.3-.1.6-.1.8.1.2.2.3.4.3.7c0 .1-.1.2-.1.3zM8.3 14l.7 2.1c.1.3.3.4.6.4.2 0 .4-.1.6-.3L11.5 15l1.6 1.1c.3.2.6.2.9-.1l1.8-4.8-6.1 4.8-.4-1.2 3.1-2.4-1.2 3.1-1.6-.1 1.6 1.1z"/></svg>
        </a>
    </div>

    <div class="info">
pvp rising talent
low y.o 
axe, nether, normal kits player
playing in... sinussmp.ru, triada.mc
hate mace pvp
say "goodbye" meet tomorrow in rainbow bridge
    </div>

    <div id="skin_container"></div>

    <div class="music-player">
        <div class="track-cover"></div>
        <div class="player-controls">
            <div class="track-info">
                <span>Now Playing: SEMATARY, Ghost Mountain — Pain </span>
                <span id="time">00:00</span>
            </div>
            <div class="progress-container" id="progress-cont">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; justify-content: center;">
                <button class="btn-play" id="play-btn">PLAY</button>
                <span style="font-size: 14px; color: #5d7a9b;">пизда лупасит</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio-track" src="music.mp3"></audio>

<script>
    window.onload = () => {
        const audio = document.getElementById('audio-track');
        const playBtn = document.getElementById('play-btn');
        const progressFill = document.getElementById('progress-fill');
        const progressCont = document.getElementById('progress-cont');
        const timeDisplay = document.getElementById('time');

        playBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); playBtn.innerText = 'PAUSE'; }
            else { audio.pause(); playBtn.innerText = 'PLAY'; }
        });

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            let mins = Math.floor(audio.currentTime / 60);
            let secs = Math.floor(audio.currentTime % 60);
            timeDisplay.innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
        });

        progressCont.addEventListener('click', (e) => {
            audio.currentTime = (e.offsetX / progressCont.clientWidth) * audio.duration;
        });

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 110 },
                "color": { "value": "#00d4ff" },
                "size": { "value": 1.2 },
                "line_linked": { "enable": true, "distance": 130, "color": "#00d4ff", "opacity": 0.15, "width": 0.5 },
                "move": { "enable": true, "speed": 1.5 }
            }
        });

        const container = document.getElementById("skin_container");
        const skinViewer = new skinview3d.SkinViewer({
            canvas: document.createElement("canvas"),
            width: 200, /* Тот же размер, что и контейнер */
            height: 300,
        });
        container.appendChild(skinViewer.canvas);
        skinViewer.loadSkin("skin.png").catch(() => skinViewer.loadSkin("https://mineskin.eu/skin/steve"));
        skinViewer.zoom = 0.8;
        skinview3d.createOrbitControls(skinViewer);
        skinViewer.animations.add(skinview3d.RotatingAnimation).speed = 0.5;
        let walk = skinViewer.animations.add(skinview3d.WalkingAnimation);
        walk.speed = 0.6;
        container.onmouseenter = () => walk.speed = 1.5;
        container.onmouseleave = () => walk.speed = 0.6;
    };
</script>

</body>
</html>
